$schema: './cache/schemas/workspace.json'

projects:
  web: 'apps/web'
  server: 'apps/server'
  proto: 'proto'
  api-client: 'packages/api-client'
  integrations: 'packages/integrations'

vcs:
  client: 'git'
  defaultBranch: 'main'
  # Git hooks (auto-synced): install once with `moon sync hooks`.
  # - pre-commit: auto-fix what machines can fix (fix), re-stage the results,
  #   then gate on the read-only check — only unfixable errors block the commit.
  #   `git update-index --again` re-stages files that were already staged, so
  #   unstaged edits are never silently picked up.
  # - commit-msg: enforce Conventional Commits via commitlint ($ARG1 = msg file);
  #   rules live in commitlint.config.mjs, deps pinned in root package.json.
  hooks:
    pre-commit:
      - 'mise exec -- moon run :fix --affected --status=staged'
      - 'git update-index --again'
      - 'mise exec -- moon run :check --affected --status=staged'
    commit-msg:
      - 'mise exec -- pnpm exec commitlint --edit $ARG1'
  sync: true
