$schema: '../cache/schemas/tasks.json'

# Global tasks inherited by every Go project (just `server` now) via the
# `inheritedBy.language` condition. A project's moon.yml may add a same-named
# task to extend these — args/deps/env/inputs merge (append by default).
inheritedBy:
  language: 'go'

tasks:
  # Composite static gate (golangci-lint v2): linters + govet. The binary is
  # pinned by mise; v2 keeps formatting in a separate `golangci-lint fmt` command.
  check:
    command: 'golangci-lint'
    args:
      - 'run'
      - '--allow-serial-runners'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '/.golangci.yml'

  # Auto-fix counterpart of `check`: format (golangci-lint fmt) then apply
  # linter autofixes (run --fix). `moon run :fix` fixes the whole repo; the
  # pre-commit hook runs it on staged projects before the read-only gate.
  fix:
    command: 'golangci-lint'
    args:
      - 'run'
      - '--allow-serial-runners'
      - '--fix'
    deps: ['~:fmt']
    options:
      cache: false
      runInCI: false

  fmt:
    command: 'golangci-lint'
    args: ['fmt']
    options:
      cache: false
      runInCI: false

  test:
    command: 'go'
    args: ['test', './...']
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

  tidy:
    command: 'go'
    args: ['mod', 'tidy']
    options:
      cache: false
      runInCI: false
