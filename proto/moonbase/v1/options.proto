syntax = "proto3";

// Package moonbase.v1 declares repo-local protobuf options that drive code
// generation beyond the wire types. Provider config and payment products are
// driver-owned runtime descriptors, not custom protobuf options.
package moonbase.v1;

import "google/protobuf/descriptor.proto";

extend google.protobuf.EnumValueOptions {
  // description carries an enum value's human-readable catalog text. A code
  // generator (protoc-gen-permissions) turns every value that has one into a
  // catalog entry — key derived from the value name — so the enum is the
  // single source for both the wire type and its Go catalog.
  string description = 50001;
}
