syntax = "proto3";

// Package role.v1 manages RBAC roles. Roles are data; the permission catalog
// is code (kept 1:1 with what RPCs enforce) and served by ListPermissions.
package role.v1;

import "auth/v1/permission.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message Role {
  string id = 1;
  string name = 2;
  string description = 3;
  // System roles (admin, user) cannot be renamed or deleted.
  bool is_system = 4;
  repeated auth.v1.Permission permissions = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message PermissionInfo {
  auth.v1.Permission permission = 1;
  string description = 2;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated Role roles = 1;
}

message ListPermissionsRequest {}

message ListPermissionsResponse {
  repeated PermissionInfo permissions = 1;
}

message CreateRoleRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string description = 2 [(buf.validate.field).string.max_len = 200];
  repeated auth.v1.Permission permissions = 3;
}

message CreateRoleResponse {
  Role role = 1;
}

// Full replace: the edit form always holds the complete role, so partial
// semantics would only add ambiguity for repeated permissions.
message UpdateRoleRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string description = 3 [(buf.validate.field).string.max_len = 200];
  repeated auth.v1.Permission permissions = 4;
}

message UpdateRoleResponse {
  Role role = 1;
}

message DeleteRoleRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteRoleResponse {}

service RoleService {
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {}
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {}
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {}
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {}
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {}
}
