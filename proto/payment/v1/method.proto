syntax = "proto3";

// Package payment.v1 — this file is the structured method catalog. The wire
// keeps payment method as a plain string (PaymentOrder.method), but PaymentMethod
// is the single structured source for each official product: which driver offers
// it, how the checkout consumes its credential, and the extra per-order inputs it
// collects. protoc-gen-paymentcatalog generates the Go (internal/paymentcatalog)
// and TS (@moonbase/api-client) catalogs from it, so the driver registry and the
// frontend both reference generated data and cannot drift.
package payment.v1;

import "moonbase/v1/options.proto";

// PaymentMethod enumerates every official provider product. Each value's id is
// its name with the PAYMENT_METHOD_ prefix dropped and lower-cased
// (PAYMENT_METHOD_PAGE_PAY -> "page_pay"); the options carry its provider,
// credential kind (qr / redirect / params) and per-order inputs. Label and
// description text stay in the client i18n catalog, not here.
enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;

  // Alipay — official API methods, in checkout display order.
  PAYMENT_METHOD_PRECREATE = 1 [
    (moonbase.v1.method_provider) = "alipay",
    (moonbase.v1.method_credential_kind) = "qr"
  ];
  PAYMENT_METHOD_PAGE_PAY = 2 [
    (moonbase.v1.method_provider) = "alipay",
    (moonbase.v1.method_credential_kind) = "redirect",
    (moonbase.v1.method_input) = "return_url"
  ];
  PAYMENT_METHOD_WAP_PAY = 3 [
    (moonbase.v1.method_provider) = "alipay",
    (moonbase.v1.method_credential_kind) = "redirect",
    (moonbase.v1.method_input) = "return_url"
  ];
  PAYMENT_METHOD_CREATE = 4 [
    (moonbase.v1.method_provider) = "alipay",
    (moonbase.v1.method_credential_kind) = "params",
    (moonbase.v1.method_input) = "payer_id"
  ];
  PAYMENT_METHOD_APP_PAY = 5 [
    (moonbase.v1.method_provider) = "alipay",
    (moonbase.v1.method_credential_kind) = "params"
  ];

  // WeChat Pay — official trade types, in checkout display order.
  PAYMENT_METHOD_NATIVE = 6 [
    (moonbase.v1.method_provider) = "wechat",
    (moonbase.v1.method_credential_kind) = "qr"
  ];
  PAYMENT_METHOD_H5 = 7 [
    (moonbase.v1.method_provider) = "wechat",
    (moonbase.v1.method_credential_kind) = "redirect"
  ];
  PAYMENT_METHOD_JSAPI = 8 [
    (moonbase.v1.method_provider) = "wechat",
    (moonbase.v1.method_credential_kind) = "params",
    (moonbase.v1.method_input) = "payer_id"
  ];
  PAYMENT_METHOD_APP = 9 [
    (moonbase.v1.method_provider) = "wechat",
    (moonbase.v1.method_credential_kind) = "params"
  ];
}
