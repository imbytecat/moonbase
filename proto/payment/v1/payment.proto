syntax = "proto3";

// Package payment.v1 exposes a public hosted checkout and a permissioned
// back-office order service. Provider profiles and products remain internal
// routing details; business callers receive only a signed checkout URL.
package payment.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "system/v1/system.proto";

message PaymentOrder {
  string id = 1;
  string out_trade_no = 2;
  string purpose = 3;
  string business_reference = 4;
  string profile_id = 5;
  string profile_name = 6;
  string provider = 7;
  string payment_method = 8;
  string product_id = 9;
  string subject = 10;
  int64 amount = 11;
  string currency = 12;
  string status = 13;
  string provider_trade_no = 14;
  string payer_id = 15;
  string failure_reason = 16;
  google.protobuf.Timestamp paid_at = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message QrAction {
  string data = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message RedirectAction {
  string url = 1;
}

message FormAction {
  string url = 1;
  string method = 2;
  map<string, string> fields = 3;
}

message WaitAction {
  int32 poll_after_ms = 1;
}

message HostedFlowAction {
  string url = 1;
}

message PaymentAction {
  oneof action {
    QrAction qr = 1;
    RedirectAction redirect = 2;
    FormAction form = 3;
    WaitAction wait = 4;
    HostedFlowAction hosted_flow = 5;
  }
}

message CheckoutPaymentMethod {
  string key = 1;
  system.v1.Presentation presentation = 2;
}

message CheckoutOrder {
  PaymentOrder order = 1;
  // Returned only through the signed checkout surface, never order lists.
  PaymentAction action = 2;
}

message CheckoutSession {
  string checkout_url = 1;
  string subject = 2;
  int64 amount = 3;
  string status = 4;
  string return_path = 5;
  google.protobuf.Timestamp expires_at = 6;
  repeated CheckoutPaymentMethod payment_methods = 7;
  CheckoutOrder order = 8;
  string payment_method = 9;
}

message CreateDemoCheckoutRequest {
  string subject = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  int64 amount = 2 [(buf.validate.field).int64 = {
    gte: 1
    lte: 10000000000
  }];
  string business_reference = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string idempotency_key = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string return_path = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];
}

message CreateDemoCheckoutResponse {
  string checkout_url = 1;
}

message GetCheckoutSessionRequest {
  string session = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

message GetCheckoutSessionResponse {
  CheckoutSession session = 1;
}

message PlanCheckoutRequest {
  string session = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string payment_method = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
}

message PlanCheckoutResponse {
  string payment_method = 1;
  system.v1.ProviderForm input = 2;
}

message ConfirmCheckoutRequest {
  string session = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string payment_method = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  google.protobuf.Struct inputs = 3;
}

message ConfirmCheckoutResponse {
  CheckoutOrder order = 1;
}

message GetCheckoutOrderRequest {
  string session = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

message GetCheckoutOrderResponse {
  CheckoutOrder order = 1;
}

message GetPaymentOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetPaymentOrderResponse {
  PaymentOrder order = 1;
}

message SyncPaymentOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message SyncPaymentOrderResponse {
  PaymentOrder order = 1;
}

message ListPaymentOrdersRequest {
  int32 page = 1 [(buf.validate.field).int32.gte = 0];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  string status = 3 [(buf.validate.field).string = {
    in: [
      "",
      "creating",
      "pending",
      "paid",
      "failed",
      "closed",
      "refunding",
      "refunded"
    ]
  }];
  string provider = 4 [(buf.validate.field).string.max_len = 32];
}

message ListPaymentOrdersResponse {
  repeated PaymentOrder orders = 1;
  int64 total = 2;
}

message RefundPaymentOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string reason = 2 [(buf.validate.field).string.max_len = 128];
}

message RefundPaymentOrderResponse {
  PaymentOrder order = 1;
}

service PaymentCheckoutService {
  rpc GetCheckoutSession(GetCheckoutSessionRequest) returns (GetCheckoutSessionResponse) {}
  rpc PlanCheckout(PlanCheckoutRequest) returns (PlanCheckoutResponse) {}
  rpc ConfirmCheckout(ConfirmCheckoutRequest) returns (ConfirmCheckoutResponse) {}
  rpc GetCheckoutOrder(GetCheckoutOrderRequest) returns (GetCheckoutOrderResponse) {}
}

service PaymentService {
  rpc CreateDemoCheckout(CreateDemoCheckoutRequest) returns (CreateDemoCheckoutResponse) {}
  rpc GetPaymentOrder(GetPaymentOrderRequest) returns (GetPaymentOrderResponse) {}
  rpc SyncPaymentOrder(SyncPaymentOrderRequest) returns (SyncPaymentOrderResponse) {}
  rpc ListPaymentOrders(ListPaymentOrdersRequest) returns (ListPaymentOrdersResponse) {}
  rpc RefundPaymentOrder(RefundPaymentOrderRequest) returns (RefundPaymentOrderResponse) {}
}
