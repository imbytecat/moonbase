message BindSmsPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindSmsPurposeResponse {
  SmsSettings sms = 1;
