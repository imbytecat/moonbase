message CreateOauthProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message CreateOauthProfileResponse {
  Profile profile = 1;
}

// Updates the profile matching profile.id. key is immutable (identity records
// reference it); missing secrets keep stored values.
message UpdateOauthProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message UpdateOauthProfileResponse {
  Profile profile = 1;
}

message DescribeOauthProvidersRequest {}

message DescribeOauthProvidersResponse {
  repeated PurposeDescriptor purposes = 1;
  repeated ProviderDescriptor providers = 2;
}

// Fails while any user identity still references the profile's key.
message DeleteOauthProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteOauthProfileResponse {}

// Binds a third-party-login purpose to a set of profiles; an empty list
// unbinds it and the sign-in page shows no third-party options.
message BindOauthPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  repeated string profile_ids = 2 [(buf.validate.field).repeated.items.string.max_len = 36];
}

message BindOauthPurposeResponse {
  OauthSettings oauth = 1;
