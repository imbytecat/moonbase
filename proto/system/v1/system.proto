  repeated string profile_ids = 2 [(buf.validate.field).repeated.items.string.max_len = 36];
}

message BindPaymentPurposeResponse {
  PaymentSettings payment = 1;
}

service SystemService {
  rpc GetSystemSettings(GetSystemSettingsRequest) returns (GetSystemSettingsResponse) {}
  rpc CreateStorageProfile(CreateStorageProfileRequest) returns (CreateStorageProfileResponse) {}
  rpc UpdateStorageProfile(UpdateStorageProfileRequest) returns (UpdateStorageProfileResponse) {}
  rpc DeleteStorageProfile(DeleteStorageProfileRequest) returns (DeleteStorageProfileResponse) {}
  rpc BindStoragePurpose(BindStoragePurposeRequest) returns (BindStoragePurposeResponse) {}
  rpc DescribeStorageProviders(DescribeStorageProvidersRequest) returns (DescribeStorageProvidersResponse) {}
  rpc CreateCaptchaProfile(CreateCaptchaProfileRequest) returns (CreateCaptchaProfileResponse) {}
  rpc UpdateCaptchaProfile(UpdateCaptchaProfileRequest) returns (UpdateCaptchaProfileResponse) {}
  rpc DeleteCaptchaProfile(DeleteCaptchaProfileRequest) returns (DeleteCaptchaProfileResponse) {}
  rpc BindCaptchaPurpose(BindCaptchaPurposeRequest) returns (BindCaptchaPurposeResponse) {}
  rpc DescribeCaptchaProviders(DescribeCaptchaProvidersRequest) returns (DescribeCaptchaProvidersResponse) {}
  rpc CreateEmailProfile(CreateEmailProfileRequest) returns (CreateEmailProfileResponse) {}
  rpc UpdateEmailProfile(UpdateEmailProfileRequest) returns (UpdateEmailProfileResponse) {}
  rpc DeleteEmailProfile(DeleteEmailProfileRequest) returns (DeleteEmailProfileResponse) {}
  rpc BindEmailPurpose(BindEmailPurposeRequest) returns (BindEmailPurposeResponse) {}
  rpc DescribeEmailProviders(DescribeEmailProvidersRequest) returns (DescribeEmailProvidersResponse) {}
  rpc CreateSmsProfile(CreateSmsProfileRequest) returns (CreateSmsProfileResponse) {}
  rpc UpdateSmsProfile(UpdateSmsProfileRequest) returns (UpdateSmsProfileResponse) {}
  rpc DeleteSmsProfile(DeleteSmsProfileRequest) returns (DeleteSmsProfileResponse) {}
  rpc BindSmsPurpose(BindSmsPurposeRequest) returns (BindSmsPurposeResponse) {}
  rpc CreateLlmProfile(CreateLlmProfileRequest) returns (CreateLlmProfileResponse) {}
  rpc UpdateLlmProfile(UpdateLlmProfileRequest) returns (UpdateLlmProfileResponse) {}
  rpc DeleteLlmProfile(DeleteLlmProfileRequest) returns (DeleteLlmProfileResponse) {}
  rpc BindLlmPurpose(BindLlmPurposeRequest) returns (BindLlmPurposeResponse) {}
  rpc DescribeLlmProviders(DescribeLlmProvidersRequest) returns (DescribeLlmProvidersResponse) {}
  rpc CreateOauthProfile(CreateOauthProfileRequest) returns (CreateOauthProfileResponse) {}
  rpc UpdateOauthProfile(UpdateOauthProfileRequest) returns (UpdateOauthProfileResponse) {}
  rpc DeleteOauthProfile(DeleteOauthProfileRequest) returns (DeleteOauthProfileResponse) {}
  rpc BindOauthPurpose(BindOauthPurposeRequest) returns (BindOauthPurposeResponse) {}
  rpc DescribeOauthProviders(DescribeOauthProvidersRequest) returns (DescribeOauthProvidersResponse) {}
  rpc CreatePaymentProfile(CreatePaymentProfileRequest) returns (CreatePaymentProfileResponse) {}
  rpc UpdatePaymentProfile(UpdatePaymentProfileRequest) returns (UpdatePaymentProfileResponse) {}
  rpc DeletePaymentProfile(DeletePaymentProfileRequest) returns (DeletePaymentProfileResponse) {}
  rpc BindPaymentPurpose(BindPaymentPurposeRequest) returns (BindPaymentPurposeResponse) {}
  rpc DescribePaymentProviders(DescribePaymentProvidersRequest) returns (DescribePaymentProvidersResponse) {}
  rpc TestStorageConnection(TestStorageConnectionRequest) returns (TestStorageConnectionResponse) {}
  rpc SendTestEmail(SendTestEmailRequest) returns (SendTestEmailResponse) {}
  rpc SendTestSms(SendTestSmsRequest) returns (SendTestSmsResponse) {}
  rpc DescribeSmsProviders(DescribeSmsProvidersRequest) returns (DescribeSmsProvidersResponse) {}
  rpc TestLlm(TestLlmRequest) returns (TestLlmResponse) {}
}
