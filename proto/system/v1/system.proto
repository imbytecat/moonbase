syntax = "proto3";

// Package system.v1 is the SYSTEM settings surface: infrastructure integrations
// (file storage, CAPTCHA, email, SMS, LLM, third-party login) configured by
// platform operators behind system.read / system.write. Provider config is
// schema-driven: drivers describe fields, base projects secrets safely and
// keeps stored secret values when their write path is absent. Business toggles
// live in settings.v1 instead.
package system.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// A storage purpose is a fixed, code-defined slot the application reads and
// writes (user avatars, site assets, ...). Binding a purpose to a profile
// turns the feature on; an unbound purpose reports "not configured".
message StorageBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message StorageSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated StorageBinding bindings = 2;
}

// A CAPTCHA purpose is a fixed, code-defined slot the application challenges
// through (login/register protection, ...). Binding a purpose to a profile
// turns the challenge on; an unbound purpose means pass-through.
message CaptchaBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message CaptchaSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated CaptchaBinding bindings = 2;
}

// An email purpose is a fixed, code-defined slot the application sends
// through (authentication codes and links, ...). Binding a purpose to a
// profile turns the feature on; an unbound purpose reports "not configured".
message EmailBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message EmailSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated EmailBinding bindings = 2;
}

message ConfigWrite {
  // Complete replacement for ordinary mutable fields. Secrets are forbidden.
  google.protobuf.Struct values = 1;
  // JSON Pointer -> non-empty replacement. A missing path keeps the stored
  // secret; clearing a secret is intentionally unsupported.
  map<string, string> secrets = 2;
}

message ConfigView {
  // Read-safe ordinary fields. Secret values never appear here.
  google.protobuf.Struct values = 1;
  // JSON Pointers for secrets that currently have a stored value.
  repeated string set_secret_paths = 2;
}

// ProfileInput is accepted by create/update/test writes. Provider config stays
// generic on the wire while each provider owns its typed contract.
message ProfileInput {
  string id = 1 [(buf.validate.field).string.max_len = 36];
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string.max_len = 64];
  ConfigWrite config = 4 [(buf.validate.field).required = true];
}

// Profile is the read-safe generic connection profile reused by every
// integration. Provider-specific fields never enter the central proto.
message Profile {
  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  // Driver key; must be one the integration's DescribeProviders advertises.
  string provider = 3 [(buf.validate.field).string.max_len = 64];
  ConfigView config = 4;
  // False means the stored config no longer matches the compiled provider
  // contract. Unknown providers also return false with an empty config.
  bool config_valid = 5;
}

// ProviderForm is a driver's config form for the frontend: an rjsf JSON Schema
// plus its companion uiSchema, generated in Go from the driver's typed schema.
// That same typed schema is the server-side validation gate, so the form and
// the gate cannot drift (ADR-0010).
message ProviderForm {
  google.protobuf.Struct schema = 1;
  google.protobuf.Struct ui_schema = 2;
}

message Presentation {
  string name = 1;
  string description = 2;
  string color = 3;
  // Namespaced icon reference, for example antd:CloudOutlined.
  string icon_ref = 4;
}

enum BindingCardinality {
  BINDING_CARDINALITY_UNSPECIFIED = 0;
  BINDING_CARDINALITY_SINGLE = 1;
  BINDING_CARDINALITY_MULTIPLE = 2;
}

message PurposeDescriptor {
  string key = 1;
  Presentation presentation = 2;
  BindingCardinality cardinality = 3;
}

message PaymentMethodDescriptor {
  string key = 1;
  Presentation presentation = 2;
}

message PaymentProductDescriptor {
  string id = 1;
  string payment_method = 2;
  Presentation presentation = 3;
  ProviderForm input = 4;
}

message PaymentProviderDescriptor {
  repeated PaymentMethodDescriptor methods = 1;
  repeated PaymentProductDescriptor products = 2;
  repeated string capabilities = 3;
}

message ProviderDescriptor {
  string key = 1;
  Presentation presentation = 2;
  ProviderForm config = 3;
  // Set only by payment drivers; other integrations leave it absent.
  PaymentProviderDescriptor payment = 4;
}

// An SMS purpose is a fixed, code-defined slot the application sends
// through (verification codes, ...). Binding a purpose to a profile turns
// the feature on; an unbound purpose reports "not configured".
message SmsBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message SmsSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated SmsBinding bindings = 2;
}

message DescribeSmsProvidersRequest {}

message DescribeSmsProvidersResponse {
  repeated PurposeDescriptor purposes = 1;
  repeated ProviderDescriptor providers = 2;
}

// An AI purpose is a fixed, code-defined slot the application calls models
// through (general chat, ...). Binding a purpose to a profile turns the
// feature on; an unbound purpose reports "not configured".
message LlmBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message LlmSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated LlmBinding bindings = 2;
}

// A third-party-login purpose is a fixed, code-defined slot like every other
// integration purpose; "login" is multi-valued — every bound profile shows on the
// sign-in page simultaneously.
message OauthBinding {
  string purpose = 1;
  // Empty = unbound; order is the sign-in page display order.
  repeated string profile_ids = 2;
}

message OauthSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated OauthBinding bindings = 2;
}

// A payment purpose is a fixed, code-defined checkout slot. Multi-valued:
// every bound profile is offered as a payment option simultaneously.
message PaymentBinding {
  string purpose = 1;
  // Empty = unbound; all listed profiles become selectable options.
  repeated string profile_ids = 2;
}

message PaymentSettings {
  repeated Profile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated PaymentBinding bindings = 2;
}

message GetSystemSettingsRequest {}

message GetSystemSettingsResponse {
  StorageSettings storage = 1;
  CaptchaSettings captcha = 2;
  EmailSettings email = 3;
  SmsSettings sms = 4;
  LlmSettings llm = 5;
  OauthSettings oauth = 6;
  PaymentSettings payment = 8;
}

message CreateStorageProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message CreateStorageProfileResponse {
  Profile profile = 1;
}

// Updates the profile matching profile.id. Missing secrets keep stored values.
message UpdateStorageProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message UpdateStorageProfileResponse {
  Profile profile = 1;
}

message DescribeStorageProvidersRequest {}

message DescribeStorageProvidersResponse {
  repeated PurposeDescriptor purposes = 1;
  repeated ProviderDescriptor providers = 2;
}

// Fails while the profile is still bound to a purpose.
message DeleteStorageProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteStorageProfileResponse {}

// Binds a storage purpose to a profile; an empty profile_id unbinds it and
// the dependent feature reports "not configured".
message BindStoragePurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindStoragePurposeResponse {
  StorageSettings storage = 1;
}

// Validates a config end-to-end (bucket reachable / directory writable).
// Pass profile to test unsaved form values (a missing secret path keeps the
// stored value from the profile with the same id), or profile_id to test a
// stored profile as-is.
message TestStorageConnectionRequest {
  optional ProfileInput profile = 1;
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message TestStorageConnectionResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a test mail through the given (or stored) profile. Pass profile to
// test unsaved form values (a missing secret path keeps the stored value from
// the profile with the same id), or profile_id to test a stored profile as-is.
message SendTestEmailRequest {
  string to = 1 [(buf.validate.field).string.email = true];
  optional ProfileInput profile = 2;
  string profile_id = 3 [(buf.validate.field).string.max_len = 36];
}

message SendTestEmailResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a test verification code through the given (or stored) profile. The
// code is formatted per the driver's template. Same profile/profile_id
// convention as SendTestEmail.
message SendTestSmsRequest {
  string phone_number = 1 [(buf.validate.field).string = {
    min_len: 5
    max_len: 20
  }];
  optional ProfileInput profile = 2;
  string profile_id = 3 [(buf.validate.field).string.max_len = 36];
}

message SendTestSmsResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a short prompt through the given (or stored) model config and returns
// the completion — proves endpoint, key and model in one call. Pass profile to
// test unsaved form values (a missing secret path keeps the stored value from
// the profile with the same id), or profile_id to test a stored profile as-is.
message TestLlmRequest {
  optional ProfileInput profile = 1;
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message TestLlmResponse {
  bool ok = 1;
  string message = 2;
}

message CreateLlmProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message CreateLlmProfileResponse {
  Profile profile = 1;
}

// Updates the profile matching profile.id. Missing secrets keep stored values.
message UpdateLlmProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message UpdateLlmProfileResponse {
  Profile profile = 1;
}

message DescribeLlmProvidersRequest {}

message DescribeLlmProvidersResponse {
  repeated PurposeDescriptor purposes = 1;
  repeated ProviderDescriptor providers = 2;
}

// Fails while the profile is still bound to a purpose.
message DeleteLlmProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteLlmProfileResponse {}

// Binds an AI purpose to a profile; an empty profile_id unbinds it and the
// dependent feature reports "not configured".
message BindLlmPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindLlmPurposeResponse {
  LlmSettings llm = 1;
}

message CreateEmailProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message CreateEmailProfileResponse {
  Profile profile = 1;
}

// Updates the profile matching profile.id. Missing secrets keep stored values.
message UpdateEmailProfileRequest {
  ProfileInput profile = 1 [(buf.validate.field).required = true];
}

message UpdateEmailProfileResponse {
  Profile profile = 1;
}

message DescribeEmailProvidersRequest {}

message DescribeEmailProvidersResponse {
  repeated PurposeDescriptor purposes = 1;
  repeated ProviderDescriptor providers = 2;
}

// Fails while the profile is still bound to a purpose.
message DeleteEmailProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
