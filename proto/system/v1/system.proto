syntax = "proto3";

// Package system.v1 is the SYSTEM settings surface: infrastructure channels
// (file storage, CAPTCHA, email, SMS, LLM, third-party login) configured by
// platform operators behind system.read / system.write. Every secret is
// write-only over the wire: reads mask it (empty + *_set=true), an empty
// secret on update keeps the stored value. Business toggles live in
// settings.v1 instead.
package system.v1;

import "buf/validate/validate.proto";
import "moonbase/v1/options.proto";

// One file-storage connection: a storage driver plus that driver's own
// config shape. Operators register any number of profiles (e.g. a public
// assets bucket and a private user-files bucket) and bind each storage
// purpose to one of them.
message StorageProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "local",
      "s3"
    ]
  }];
  LocalStorageConfig local = 4;
  S3StorageConfig s3 = 5;
}

// Server-local disk storage. Uploads and reads go through the application
// server itself via short-lived signed URLs — zero external dependencies,
// suited to single-instance deployments.
message LocalStorageConfig {
  // Directory on the server's filesystem; relative paths resolve against the
  // server working directory. Created on first use.
  string directory = 1 [(buf.validate.field).string.max_len = 512];
}

// Any S3-compatible endpoint (AWS S3, MinIO, R2, ...).
message S3StorageConfig {
  string endpoint = 1 [(buf.validate.field).string.max_len = 253];
  string region = 2 [(buf.validate.field).string.max_len = 64];
  string bucket = 3 [(buf.validate.field).string.max_len = 63];
  string access_key_id = 4 [(buf.validate.field).string.max_len = 128];
  string secret_access_key = 5 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  bool use_ssl = 6;
  // Public base URL of the bucket (e.g. a CDN or website endpoint). When set,
  // object URLs are built as <public_base_url>/<key> — the bucket must allow
  // anonymous reads. When empty the bucket is treated as private and reads go
  // through short-lived presigned URLs.
  string public_base_url = 7 [(buf.validate.field).string.max_len = 512];
  bool secret_access_key_set = 8;
}

// A storage purpose is a fixed, code-defined slot the application reads and
// writes (user avatars, site assets, ...). Binding a purpose to a profile
// turns the feature on; an unbound purpose reports "not configured".
message StorageBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message StorageSettings {
  repeated StorageProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated StorageBinding bindings = 2;
}

// One CAPTCHA connection: a verification driver plus that driver's own
// config shape. The public key (Turnstile site key / Geetest captcha_id)
// flows to the login page via auth.v1 GetAuthConfig; the server-side key is
// write-only. Operators register any number of profiles and bind each
// CAPTCHA purpose to one of them.
message CaptchaProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "turnstile",
      "geetest",
      "altcha"
    ]
  }];
  TurnstileCaptchaConfig turnstile = 4;
  GeetestCaptchaConfig geetest = 5;
  AltchaCaptchaConfig altcha = 6;
}

// Cloudflare Turnstile; keys from the Cloudflare dashboard.
message TurnstileCaptchaConfig {
  string site_key = 1 [(buf.validate.field).string.max_len = 128];
  string secret_key = 2 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  bool secret_key_set = 3;
}

// Geetest v4 web integration; keys from the Geetest console.
message GeetestCaptchaConfig {
  string captcha_id = 1 [(buf.validate.field).string.max_len = 128];
  string captcha_key = 2 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  bool captcha_key_set = 3;
}

// Built-in ALTCHA proof-of-work challenge (https://altcha.org): fully
// self-hosted, no external service, works offline / on air-gapped networks.
// The browser solves a small hash puzzle instead of the user solving a
// picture. difficulty is the maximum random number the widget brute-forces
// (bigger = slower for bots AND users); 0 uses the built-in default.
message AltchaCaptchaConfig {
  int32 difficulty = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 10000000
  }];
}

// A CAPTCHA purpose is a fixed, code-defined slot the application challenges
// through (login/register protection, ...). Binding a purpose to a profile
// turns the challenge on; an unbound purpose means pass-through.
message CaptchaBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message CaptchaSettings {
  repeated CaptchaProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated CaptchaBinding bindings = 2;
}

// One outbound-email connection: a delivery driver plus that driver's own
// config shape — each driver's parameters are deliberately different, only
// the sending seam is shared. Sender identity (from_*) is per profile so two
// profiles can send as different addresses. Operators register any number of
// profiles and bind each email purpose to one of them.
message EmailProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "smtp",
      "cloudflare"
    ]
  }];
  string from_address = 4 [(buf.validate.field).string.max_len = 254];
  string from_name = 5 [(buf.validate.field).string.max_len = 100];
  SmtpConfig smtp = 6;
  CloudflareEmailConfig cloudflare = 7;
}

// An email purpose is a fixed, code-defined slot the application sends
// through (authentication codes and links, ...). Binding a purpose to a
// profile turns the feature on; an unbound purpose reports "not configured".
message EmailBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message EmailSettings {
  repeated EmailProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated EmailBinding bindings = 2;
}

// Plain SMTP — works with any provider exposing an SMTP endpoint.
message SmtpConfig {
  string host = 1 [(buf.validate.field).string.max_len = 253];
  int32 port = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 65535
  }];
  string username = 3 [(buf.validate.field).string.max_len = 128];
  string password = 4 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  // "starttls" (587), "ssl" (465) or "none" (unencrypted, e.g. a local dev
  // SMTP server).
  string encryption = 5 [(buf.validate.field).string = {
    in: [
      "",
      "starttls",
      "ssl",
      "none"
    ]
  }];
  bool password_set = 6;
}

// Cloudflare Email Service (Email Sending REST API). The sender domain must
// be onboarded for Email Sending on the account that owns the token.
message CloudflareEmailConfig {
  string account_id = 1 [(buf.validate.field).string.max_len = 64];
  string api_token = 2 [
    (buf.validate.field).string.max_len = 256,
    (moonbase.v1.secret) = true
  ];
  bool api_token_set = 3;
}

// One SMS connection: a delivery driver plus that driver's own config shape
// (sign name / template layout differ per vendor — that variance lives in
// the driver config, only the send-code seam is shared). Operators register
// any number of profiles and bind each SMS purpose to one of them.
message SmsProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "aliyun",
      "tencent"
    ]
  }];
  AliyunSmsConfig aliyun = 4;
  TencentSmsConfig tencent = 5;
}

// An SMS purpose is a fixed, code-defined slot the application sends
// through (verification codes, ...). Binding a purpose to a profile turns
// the feature on; an unbound purpose reports "not configured".
message SmsBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message SmsSettings {
  repeated SmsProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated SmsBinding bindings = 2;
}

message AliyunSmsConfig {
  string access_key_id = 1 [(buf.validate.field).string.max_len = 128];
  string access_key_secret = 2 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  string sign_name = 3 [(buf.validate.field).string.max_len = 64];
  // Template with a single {code} variable.
  string template_code = 4 [(buf.validate.field).string.max_len = 64];
  bool access_key_secret_set = 5;
}

message TencentSmsConfig {
  string secret_id = 1 [(buf.validate.field).string.max_len = 128];
  string secret_key = 2 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  string sdk_app_id = 3 [(buf.validate.field).string.max_len = 32];
  string sign_name = 4 [(buf.validate.field).string.max_len = 64];
  // Template with a single code parameter.
  string template_id = 5 [(buf.validate.field).string.max_len = 32];
  // API region, e.g. ap-guangzhou.
  string region = 6 [(buf.validate.field).string.max_len = 32];
  bool secret_key_set = 7;
}

// One AI model connection: a provider (API dialect) plus that dialect's
// config. "openai" is any OpenAI-compatible endpoint (hosted or self-hosted)
// selected via base_url; "anthropic" is the native Messages API. Operators
// register any number of profiles (e.g. a fast cheap model and a strong
// reasoning model) and bind each AI purpose to one of them.
message LlmProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "openai",
      "anthropic"
    ]
  }];
  OpenAiLlmConfig openai = 4;
  AnthropicLlmConfig anthropic = 5;
}

// An AI purpose is a fixed, code-defined slot the application calls models
// through (general chat, ...). Binding a purpose to a profile turns the
// feature on; an unbound purpose reports "not configured".
message LlmBinding {
  string purpose = 1;
  // Empty = unbound.
  string profile_id = 2;
}

message LlmSettings {
  repeated LlmProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated LlmBinding bindings = 2;
}

message OpenAiLlmConfig {
  // Base URL of an OpenAI-compatible endpoint; empty = the official API.
  string base_url = 1 [(buf.validate.field).string.max_len = 512];
  string api_key = 2 [
    (buf.validate.field).string.max_len = 256,
    (moonbase.v1.secret) = true
  ];
  string model = 3 [(buf.validate.field).string.max_len = 128];
  bool api_key_set = 4;
}

message AnthropicLlmConfig {
  // Optional gateway base URL; empty = the official API.
  string base_url = 1 [(buf.validate.field).string.max_len = 512];
  string api_key = 2 [
    (buf.validate.field).string.max_len = 256,
    (moonbase.v1.secret) = true
  ];
  string model = 3 [(buf.validate.field).string.max_len = 128];
  bool api_key_set = 4;
}

// One third-party login connection. Unlike other channels there are no
// purpose bindings: every enabled profile shows on the login page
// simultaneously. key is the operator-chosen stable identifier — it names
// the profile in identity records and the browser flow URL
// (/api/oauth/{key}/...), so it is immutable after creation; name is the
// login-button label. The "oidc" driver covers any OpenID Connect provider
// (Google, GitHub via OIDC proxies, Keycloak, Authentik, ...); "wechat" is
// the WeChat Open Platform QR-login dialect.
message OauthProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Stable slug used in identity records and flow URLs; immutable.
  string key = 2 [
    (buf.validate.field).string.pattern = "^[a-z][a-z0-9-]{1,31}$",
    (moonbase.v1.immutable) = true
  ];
  // Login-button label shown to end users.
  string name = 3 [(buf.validate.field).string.max_len = 64];
  string provider = 4 [(buf.validate.field).string = {
    in: [
      "oidc",
      "wechat"
    ]
  }];
  OidcOauthConfig oidc = 5;
  WechatOauthConfig wechat = 6;
}

// Standard OpenID Connect authorization-code flow; endpoints come from the
// issuer's discovery document.
message OidcOauthConfig {
  // Issuer URL, e.g. https://accounts.google.com — discovery is fetched from
  // <issuer>/.well-known/openid-configuration.
  string issuer = 1 [(buf.validate.field).string.max_len = 512];
  string client_id = 2 [(buf.validate.field).string.max_len = 256];
  string client_secret = 3 [
    (buf.validate.field).string.max_len = 256,
    (moonbase.v1.secret) = true
  ];
  // Requested scopes; empty = "openid profile email".
  string scopes = 4 [(buf.validate.field).string.max_len = 256];
  bool client_secret_set = 5;
}

// WeChat Open Platform "website application" (QR-code login); credentials
// from open.weixin.qq.com.
message WechatOauthConfig {
  string app_id = 1 [(buf.validate.field).string.max_len = 64];
  string app_secret = 2 [
    (buf.validate.field).string.max_len = 128,
    (moonbase.v1.secret) = true
  ];
  bool app_secret_set = 3;
}

// A third-party-login purpose is a fixed, code-defined slot like every other
// channel purpose; "login" is multi-valued — every bound profile shows on the
// sign-in page simultaneously.
message OauthBinding {
  string purpose = 1;
  // Empty = unbound; order is the sign-in page display order.
  repeated string profile_ids = 2;
}

message OauthSettings {
  repeated OauthProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated OauthBinding bindings = 2;
}

// One payment-gateway connection: a payment driver plus that driver's own
// merchant credentials. Payment purposes are multi-valued: every bound
// profile becomes a selectable payment option (e.g. Alipay AND WeChat Pay on
// the same checkout), and the payer picks one at pay time.
message PaymentProfile {
  option (moonbase.v1.profile) = true;

  // Server-assigned id; empty on create.
  string id = 1 [(buf.validate.field).string.max_len = 36];
  // Display name shown wherever a profile is picked.
  string name = 2 [(buf.validate.field).string.max_len = 64];
  string provider = 3 [(buf.validate.field).string = {
    in: [
      "alipay",
      "wechat"
    ]
  }];
  AlipayPaymentConfig alipay = 4;
  WechatPaymentConfig wechat = 5;
  // Official provider products this merchant signed for, keyed by the
  // provider's official API method — Alipay (precreate 当面付/订单码,
  // page_pay 电脑网站支付, wap_pay 手机网站支付, create 小程序支付,
  // app_pay APP 支付) or WeChat trade_type (native, h5, jsapi, app). A profile
  // only offers what it subscribed to; empty = all of the provider's products,
  // for back-compat.
  repeated string methods = 6 [(buf.validate.field).repeated = {
    unique: true
    items: {
      string: {
        in: [
          "precreate",
          "page_pay",
          "wap_pay",
          "create",
          "app_pay",
          "native",
          "h5",
          "jsapi",
          "app"
        ]
      }
    }
  }];
}

// Alipay open-platform merchant credentials (V3 OpenAPI). The application's
// RSA private key signs requests; responses and async notifications are
// verified per auth_method: "public_key" uses the platform's public key,
// "cert" uses the certificate chain issued by the open platform.
message AlipayPaymentConfig {
  string app_id = 1 [(buf.validate.field).string.max_len = 32];
  // Application RSA private key, PEM or base64 body. Write-only.
  string app_private_key = 2 [
    (buf.validate.field).string.max_len = 8192,
    (moonbase.v1.secret) = true
  ];
  bool app_private_key_set = 3;
  string auth_method = 4 [(buf.validate.field).string = {
    in: [
      "",
      "public_key",
      "cert"
    ]
  }];
  // Platform public key (公钥模式), PEM or base64 body.
  string alipay_public_key = 5 [(buf.validate.field).string.max_len = 8192];
  // Certificate mode (证书模式): the three certificates downloaded from the
  // open platform. Not secret, but long PEM blobs.
  string app_cert = 6 [(buf.validate.field).string.max_len = 16384];
  string alipay_root_cert = 7 [(buf.validate.field).string.max_len = 16384];
  string alipay_public_cert = 8 [(buf.validate.field).string.max_len = 16384];
  // Mini-program APPID for 小程序支付 (jsapi_pay): alipay.trade.create sends it
  // as op_app_id and the order fails without it. Not secret.
  string op_app_id = 9 [(buf.validate.field).string.max_len = 32];
}

// WeChat Pay merchant credentials (APIv3). The merchant certificate's
// private key signs requests; platform responses and callbacks are verified
// per auth_method: "public_key" uses the WeChat Pay public key issued to
// merchants onboarded after 2024, "platform_cert" auto-downloads platform
// certificates (older merchants).
message WechatPaymentConfig {
  // Merchant id (商户号).
  string mch_id = 1 [(buf.validate.field).string.max_len = 32];
  // The appid bound to the merchant (公众号/开放平台/小程序 appid).
  string app_id = 2 [(buf.validate.field).string.max_len = 32];
  // Merchant API certificate serial number.
  string mch_cert_serial_no = 3 [(buf.validate.field).string.max_len = 64];
  // Merchant API certificate private key, PEM. Write-only.
  string mch_private_key = 4 [
    (buf.validate.field).string.max_len = 8192,
    (moonbase.v1.secret) = true
  ];
  bool mch_private_key_set = 5;
  // APIv3 key (32 chars) decrypting callback ciphertexts. Write-only.
  string api_v3_key = 6 [
    (buf.validate.field).string.max_len = 64,
    (moonbase.v1.secret) = true
  ];
  bool api_v3_key_set = 7;
  string auth_method = 8 [(buf.validate.field).string = {
    in: [
      "",
      "public_key",
      "platform_cert"
    ]
  }];
  // WeChat Pay public key id (PUB_KEY_ID_...), public-key mode only.
  string public_key_id = 9 [(buf.validate.field).string.max_len = 64];
  // WeChat Pay public key, PEM. Public-key mode only.
  string public_key = 10 [(buf.validate.field).string.max_len = 8192];
}

// A payment purpose is a fixed, code-defined checkout slot. Multi-valued:
// every bound profile is offered as a payment option simultaneously.
message PaymentBinding {
  string purpose = 1;
  // Empty = unbound; all listed profiles become selectable options.
  repeated string profile_ids = 2;
}

message PaymentSettings {
  repeated PaymentProfile profiles = 1;
  // One entry per known purpose, in catalog order.
  repeated PaymentBinding bindings = 2;
}

message GetSystemSettingsRequest {}

message GetSystemSettingsResponse {
  StorageSettings storage = 1;
  CaptchaSettings captcha = 2;
  EmailSettings email = 3;
  SmsSettings sms = 4;
  LlmSettings llm = 5;
  OauthSettings oauth = 6;
  PaymentSettings payment = 8;
}

message CreateStorageProfileRequest {
  StorageProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateStorageProfileResponse {
  StorageProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdateStorageProfileRequest {
  StorageProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateStorageProfileResponse {
  StorageProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeleteStorageProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteStorageProfileResponse {}

// Binds a storage purpose to a profile; an empty profile_id unbinds it and
// the dependent feature reports "not configured".
message BindStoragePurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindStoragePurposeResponse {
  StorageSettings storage = 1;
}

// Validates a config end-to-end (bucket reachable / directory writable).
// Pass profile to test unsaved form values (an empty secret falls back to
// the stored profile with the same id), or profile_id to test a stored
// profile as-is.
message TestStorageConnectionRequest {
  optional StorageProfile profile = 1;
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message TestStorageConnectionResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a test mail through the given (or stored) profile. Pass profile to
// test unsaved form values (an empty secret falls back to the stored profile
// with the same id), or profile_id to test a stored profile as-is.
message SendTestEmailRequest {
  string to = 1 [(buf.validate.field).string.email = true];
  optional EmailProfile profile = 2;
  string profile_id = 3 [(buf.validate.field).string.max_len = 36];
}

message SendTestEmailResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a test verification code through the given (or stored) profile. The
// code is formatted per the driver's template. Same profile/profile_id
// convention as SendTestEmail.
message SendTestSmsRequest {
  string phone_number = 1 [(buf.validate.field).string = {
    min_len: 5
    max_len: 20
  }];
  optional SmsProfile profile = 2;
  string profile_id = 3 [(buf.validate.field).string.max_len = 36];
}

message SendTestSmsResponse {
  bool ok = 1;
  string message = 2;
}

// Sends a short prompt through the given (or stored) model config and returns
// the completion — proves endpoint, key and model in one call. Pass profile to
// test unsaved form values (an empty secret falls back to the stored profile
// with the same id), or profile_id to test a stored profile as-is.
message TestLlmRequest {
  optional LlmProfile profile = 1;
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message TestLlmResponse {
  bool ok = 1;
  string message = 2;
}

message CreateLlmProfileRequest {
  LlmProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateLlmProfileResponse {
  LlmProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdateLlmProfileRequest {
  LlmProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateLlmProfileResponse {
  LlmProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeleteLlmProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteLlmProfileResponse {}

// Binds an AI purpose to a profile; an empty profile_id unbinds it and the
// dependent feature reports "not configured".
message BindLlmPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindLlmPurposeResponse {
  LlmSettings llm = 1;
}

message CreateEmailProfileRequest {
  EmailProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateEmailProfileResponse {
  EmailProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdateEmailProfileRequest {
  EmailProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateEmailProfileResponse {
  EmailProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeleteEmailProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteEmailProfileResponse {}

// Binds an email purpose to a profile; an empty profile_id unbinds it and
// the dependent feature reports "not configured".
message BindEmailPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindEmailPurposeResponse {
  EmailSettings email = 1;
}

message CreateSmsProfileRequest {
  SmsProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateSmsProfileResponse {
  SmsProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdateSmsProfileRequest {
  SmsProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateSmsProfileResponse {
  SmsProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeleteSmsProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteSmsProfileResponse {}

// Binds an SMS purpose to a profile; an empty profile_id unbinds it and the
// dependent feature reports "not configured".
message BindSmsPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindSmsPurposeResponse {
  SmsSettings sms = 1;
}

message CreateCaptchaProfileRequest {
  CaptchaProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateCaptchaProfileResponse {
  CaptchaProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdateCaptchaProfileRequest {
  CaptchaProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateCaptchaProfileResponse {
  CaptchaProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeleteCaptchaProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteCaptchaProfileResponse {}

// Binds a CAPTCHA purpose to a profile; an empty profile_id unbinds it and
// the challenge becomes pass-through.
message BindCaptchaPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  string profile_id = 2 [(buf.validate.field).string.max_len = 36];
}

message BindCaptchaPurposeResponse {
  CaptchaSettings captcha = 1;
}

message CreateOauthProfileRequest {
  OauthProfile profile = 1 [(buf.validate.field).required = true];
}

message CreateOauthProfileResponse {
  OauthProfile profile = 1;
}

// Updates the profile matching profile.id. key is immutable (identity records
// reference it); an empty secret keeps the stored value.
message UpdateOauthProfileRequest {
  OauthProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdateOauthProfileResponse {
  OauthProfile profile = 1;
}

// Fails while any user identity still references the profile's key.
message DeleteOauthProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteOauthProfileResponse {}

// Binds a third-party-login purpose to a set of profiles; an empty list
// unbinds it and the sign-in page shows no third-party options.
message BindOauthPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  repeated string profile_ids = 2 [(buf.validate.field).repeated.items.string.max_len = 36];
}

message BindOauthPurposeResponse {
  OauthSettings oauth = 1;
}

message CreatePaymentProfileRequest {
  PaymentProfile profile = 1 [(buf.validate.field).required = true];
}

message CreatePaymentProfileResponse {
  PaymentProfile profile = 1;
}

// Updates the profile matching profile.id. An empty secret keeps the stored
// value.
message UpdatePaymentProfileRequest {
  PaymentProfile profile = 1 [(buf.validate.field).required = true];
}

message UpdatePaymentProfileResponse {
  PaymentProfile profile = 1;
}

// Fails while the profile is still bound to a purpose.
message DeletePaymentProfileRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeletePaymentProfileResponse {}

// Binds a payment purpose to a set of profiles; an empty list unbinds it and
// the checkout reports "not configured".
message BindPaymentPurposeRequest {
  string purpose = 1 [(buf.validate.field).string.min_len = 1];
  repeated string profile_ids = 2 [(buf.validate.field).repeated.items.string.max_len = 36];
}

message BindPaymentPurposeResponse {
  PaymentSettings payment = 1;
}

