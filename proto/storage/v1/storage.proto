syntax = "proto3";

// Package storage.v1 issues presigned URLs so browsers upload/download
// directly against S3-compatible storage — the server never proxies bytes.
// Each upload RPC targets a fixed storage purpose (see system.v1
// StorageBinding); the server picks the object key and the backing profile.
package storage.v1;

import "buf/validate/validate.proto";

// PresignAvatarUpload authorizes the caller to upload their own avatar.
// The server picks the object key (avatars/<id>/<rand>.<ext>); the
// client PUTs the file to upload_url, then saves object_key via
// auth.v1 UpdateProfile.
message PresignAvatarUploadRequest {
  string content_type = 1 [(buf.validate.field).string = {
    in: [
      "image/jpeg",
      "image/png",
      "image/webp"
    ]
  }];
  int64 content_length = 2 [(buf.validate.field).int64 = {
    gt: 0
    lte: 5242880 // 5 MiB
  }];
}

message PresignAvatarUploadResponse {
  string upload_url = 1;
  string object_key = 2;
  // file_id is the ledger row created for this object at presign time
  // (ADR-0003 "presign 即落库"); consumers attach it once the upload is saved.
  string file_id = 3;
}

// PresignSiteAssetUpload authorizes uploading site branding (logo / favicon)
// into the site-assets purpose. Requires settings.write. kind picks the key
// prefix; the client saves the returned object_key via settings.v1
// UpdateSettings.
message PresignSiteAssetUploadRequest {
  string kind = 1 [(buf.validate.field).string = {
    in: [
      "logo",
      "favicon"
    ]
  }];
  string content_type = 2 [(buf.validate.field).string = {
    in: [
      "image/jpeg",
      "image/png",
      "image/webp",
      "image/svg+xml",
      "image/x-icon",
      "image/vnd.microsoft.icon"
    ]
  }];
  int64 content_length = 3 [(buf.validate.field).int64 = {
    gt: 0
    lte: 2097152 // 2 MiB
  }];
}

message PresignSiteAssetUploadResponse {
  string upload_url = 1;
  string object_key = 2;
  string file_id = 3;
}

service StorageService {
  rpc PresignAvatarUpload(PresignAvatarUploadRequest) returns (PresignAvatarUploadResponse) {}
  rpc PresignSiteAssetUpload(PresignSiteAssetUploadRequest) returns (PresignSiteAssetUploadResponse) {}
}
