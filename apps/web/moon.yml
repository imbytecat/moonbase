$schema: '../../.moon/cache/schemas/project.json'

layer: 'application'
stack: 'frontend'
language: 'typescript'
dependsOn: ['proto']

# Tasks run through pnpm (pinned and installed by mise) via package.json scripts.
tasks:
  dev:
    command: 'pnpm'
    args: ['run', 'dev']
    deps: ['proto:generate']
    preset: 'server'

  # Generates src/routeTree.gen.ts from src/routes (Vite plugin also does this).
  gen:
    command: 'pnpm'
    args: ['run', 'gen:routes']
    inputs:
      - 'src/routes/**/*'
      - 'tsr.config.json'
    outputs:
      - 'src/routeTree.gen.ts'

  build:
    command: 'pnpm'
    args: ['run', 'build']
    deps: ['proto:generate', '~:gen']
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsr.config.json'
      - 'package.json'
    outputs:
      - '/apps/server/internal/web/dist'

  preview:
    command: 'pnpm'
    args: ['run', 'preview']
    preset: 'server'

  typecheck:
    command: 'pnpm'
    args: ['run', 'typecheck']
    deps: ['proto:generate', '~:gen']
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'tsr.config.json'

  test:
    command: 'pnpm'
    args: ['run', 'test']
    deps: ['proto:generate']
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'
      - 'package.json'
      # The provider contract test compiles the actual Go-reflected schemas in Ajv.
      - '/packages/integrations/core/config/**/*.go'
      - '/packages/integrations/email/**/*.go'
      - '/packages/integrations/go.mod'
      - '/packages/integrations/go.sum'
