# golangci-lint v2 — https://golangci-lint.run
# Run via `moon run server:check` (go run, version-pinned).
version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose # HTTP response bodies are closed
    - errorlint # correct error wrapping/comparison (Go 1.13+)
    - misspell # catch common misspellings

formatters:
  enable:
    - gofmt
    - goimports
